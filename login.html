<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>配車WEBアプリ ログイン</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#d8e0ea;
      --text:#1f2937;
      --sub:#6b7280;
      --blue:#2563eb;
      --blue2:#1d4ed8;
      --red:#dc2626;
      --green:#16a34a;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card{
      width:100%;
      max-width:520px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }
    h1{
      margin:0 0 8px;
      font-size:26px;
      line-height:1.3;
    }
    .sub{
      margin:0 0 20px;
      color:var(--sub);
      font-size:14px;
      line-height:1.6;
    }
    .status{
      display:none;
      margin:0 0 16px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      line-height:1.6;
    }
    .status.show{display:block}
    .status.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .status.error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .status.ok{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
    .field{margin-bottom:14px}
    label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
      font-weight:700;
    }
    input,select,button{
      width:100%;
      min-height:46px;
      border-radius:12px;
      border:1px solid var(--line);
      padding:10px 12px;
      font-size:16px;
      background:#fff;
      font-family:inherit;
    }
    input:focus,select:focus{
      outline:none;
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }
    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .actions{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:18px;
    }
    .btn{
      border:none;
      cursor:pointer;
      font-weight:700;
    }
    .btn-primary{
      background:var(--blue);
      color:#fff;
    }
    .btn-primary:hover{background:var(--blue2)}
    .btn-secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }
    .foot{
      margin-top:16px;
      font-size:13px;
      color:var(--sub);
      line-height:1.6;
    }
    .hint{
      font-size:12px;
      color:var(--sub);
      margin-top:4px;
    }
    .badge{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      background:#eef2ff;
      color:#4338ca;
      font-size:12px;
      font-weight:700;
      margin-bottom:8px;
    }
    .loading{
      opacity:.7;
      pointer-events:none;
    }
    @media (max-width:640px){
      .row{grid-template-columns:1fr}
      .card{padding:18px}
      h1{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="card">
      <div class="badge">配車WEBアプリ</div>
      <h1>ログイン</h1>
      <p class="sub">
        会社コード・パスコード・役割でログインします。<br>
        同一端末では次回から自動ログインします。
      </p>

      <div id="status" class="status"></div>

      <form id="loginForm">
        <div class="field">
          <label for="companyCode">会社コード</label>
          <input id="companyCode" type="text" placeholder="例: saitamanishi" autocomplete="organization" />
        </div>

        <div class="row">
          <div class="field">
            <label for="role">役割</label>
            <select id="role">
              <option value="admin">配車係</option>
              <option value="driver">ドライバー</option>
            </select>
          </div>

          <div class="field">
            <label for="passcode">パスコード</label>
            <input id="passcode" type="password" placeholder="パスコード" autocomplete="current-password" />
          </div>
        </div>

        <div class="field">
          <label for="displayName">名前（任意）</label>
          <input id="displayName" type="text" placeholder="例: 山田" autocomplete="name" />
          <div class="hint">未入力でもログインできます。</div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="loginBtn">ログイン</button>
          <button type="button" class="btn btn-secondary" id="clearSavedBtn">保存済みログイン情報を削除</button>
        </div>
      </form>

      <div class="foot">
        初期会社データ未作成時は、<br>
        <strong>saitamanishi / 埼玉西営業所</strong> を自動作成します。
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDeSlcwN5AnbpD-zCU05bCxVNp5n9oPKBg",
      authDomain: "dispatch-453ca.firebaseapp.com",
      databaseURL: "https://dispatch-453ca-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "dispatch-453ca",
      storageBucket: "dispatch-453ca.firebasestorage.app",
      messagingSenderId: "748642568165",
      appId: "1:748642568165:web:6f73bbb5a80f0f4817910c",
      measurementId: "G-PQ4QWLLX6T"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const LOGIN_KEY = "dispatchLogin";
    const DEFAULT_COMPANY = {
      companyCode: "saitamanishi",
      companyName: "埼玉西営業所",
      adminPasscode: "1111",
      driverPasscode: "2222"
    };

    const card = document.getElementById("card");
    const statusEl = document.getElementById("status");
    const loginForm = document.getElementById("loginForm");
    const companyCodeEl = document.getElementById("companyCode");
    const roleEl = document.getElementById("role");
    const passcodeEl = document.getElementById("passcode");
    const displayNameEl = document.getElementById("displayName");
    const loginBtn = document.getElementById("loginBtn");
    const clearSavedBtn = document.getElementById("clearSavedBtn");

    function showStatus(message, type = "info") {
      statusEl.className = "status show " + type;
      statusEl.textContent = message;
    }

    function hideStatus() {
      statusEl.className = "status";
      statusEl.textContent = "";
    }

    function setLoading(isLoading) {
      if (isLoading) {
        card.classList.add("loading");
        loginBtn.textContent = "処理中...";
      } else {
        card.classList.remove("loading");
        loginBtn.textContent = "ログイン";
      }
    }

    function normalizeCompanyCode(v) {
      return String(v || "").trim().toLowerCase();
    }

    function getSavedLogin() {
      try {
        return JSON.parse(localStorage.getItem(LOGIN_KEY) || "null");
      } catch (e) {
        return null;
      }
    }

    function saveLogin(data) {
      localStorage.setItem(LOGIN_KEY, JSON.stringify(data));
    }

    function clearSavedLogin() {
      localStorage.removeItem(LOGIN_KEY);
      localStorage.removeItem("dispatchSelectedDeliveryId");
      localStorage.removeItem("dispatchSelectedDeliveryLat");
      localStorage.removeItem("dispatchSelectedDeliveryLng");
    }

    function goByRole(role) {
      if (role === "admin") {
        location.href = "admin.html";
      } else {
        location.href = "driver.html";
      }
    }

    async function getProfile(companyCode) {
      const snap = await db.ref(`companies/${companyCode}/profile`).get();
      return snap.exists() ? snap.val() : null;
    }

    async function ensureDefaultCompanyIfNeeded(companyCode) {
      if (companyCode !== DEFAULT_COMPANY.companyCode) return;

      const profileRef = db.ref(`companies/${companyCode}/profile`);
      const profileSnap = await profileRef.get();

      if (!profileSnap.exists()) {
        await profileRef.set({
          companyName: DEFAULT_COMPANY.companyName,
          adminPasscode: DEFAULT_COMPANY.adminPasscode,
          driverPasscode: DEFAULT_COMPANY.driverPasscode,
          createdAt: Date.now()
        });
      }

      const categoriesRef = db.ref(`companies/${companyCode}/categories`);
      const categoriesSnap = await categoriesRef.get();

      if (!categoriesSnap.exists()) {
        const now = Date.now();
        await categoriesRef.set({
          cat1: { name: "通常配達", color: "#2563eb", sort: 10, createdAt: now },
          cat2: { name: "至急", color: "#dc2626", sort: 20, createdAt: now + 1 },
          cat3: { name: "回収", color: "#16a34a", sort: 30, createdAt: now + 2 }
        });
      }
    }

    async function tryAutoLogin() {
      const saved = getSavedLogin();
      if (!saved) return;

      const companyCode = normalizeCompanyCode(saved.companyCode);
      const role = saved.role === "admin" ? "admin" : (saved.role === "driver" ? "driver" : "");
      const passcode = String(saved.passcode || "");
      const displayName = String(saved.displayName || "");

      if (!companyCode || !role || !passcode) return;

      showStatus("保存済み情報を確認しています...", "info");
      setLoading(true);

      try {
        await ensureDefaultCompanyIfNeeded(companyCode);
        const profile = await getProfile(companyCode);

        if (!profile) {
          clearSavedLogin();
          hideStatus();
          setLoading(false);
          return;
        }

        const correctPasscode = role === "admin"
          ? String(profile.adminPasscode || "")
          : String(profile.driverPasscode || "");

        if (passcode !== correctPasscode) {
          clearSavedLogin();
          showStatus("保存済みログイン情報が無効です。再入力してください。", "error");
          setLoading(false);
          return;
        }

        saveLogin({
          companyCode,
          companyName: String(profile.companyName || companyCode),
          role,
          passcode,
          displayName,
          loggedInAt: Date.now()
        });

        showStatus("自動ログインします...", "ok");
        goByRole(role);
      } catch (err) {
        console.error(err);
        showStatus("自動ログインに失敗しました。", "error");
        setLoading(false);
      }
    }

    (function init() {
      const params = new URLSearchParams(location.search);

      if (params.get("logout") === "1") {
        showStatus("ログアウトしました。", "ok");
      }

      const saved = getSavedLogin();
      if (saved) {
        companyCodeEl.value = saved.companyCode || "";
        roleEl.value = saved.role || "admin";
        passcodeEl.value = saved.passcode || "";
        displayNameEl.value = saved.displayName || "";
      } else {
        companyCodeEl.value = DEFAULT_COMPANY.companyCode;
        roleEl.value = "admin";
      }

      tryAutoLogin();
    })();

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideStatus();

      const companyCode = normalizeCompanyCode(companyCodeEl.value);
      const role = roleEl.value === "driver" ? "driver" : "admin";
      const passcode = String(passcodeEl.value || "").trim();
      const displayName = String(displayNameEl.value || "").trim();

      if (!companyCode) {
        showStatus("会社コードを入力してください。", "error");
        companyCodeEl.focus();
        return;
      }
      if (!passcode) {
        showStatus("パスコードを入力してください。", "error");
        passcodeEl.focus();
        return;
      }

      setLoading(true);
      showStatus("ログイン確認中...", "info");

      try {
        await ensureDefaultCompanyIfNeeded(companyCode);
        const profile = await getProfile(companyCode);

        if (!profile) {
          showStatus("会社コードが見つかりません。", "error");
          setLoading(false);
          return;
        }

        const correctPasscode = role === "admin"
          ? String(profile.adminPasscode || "")
          : String(profile.driverPasscode || "");

        if (passcode !== correctPasscode) {
          showStatus(role === "admin" ? "配車係用パスコードが違います。" : "ドライバー用パスコードが違います。", "error");
          setLoading(false);
          return;
        }

        saveLogin({
          companyCode,
          companyName: String(profile.companyName || companyCode),
          role,                // admin / driver で固定
          passcode,
          displayName,
          loggedInAt: Date.now()
        });

        showStatus("ログイン成功。画面を移動します...", "ok");
        goByRole(role);
      } catch (err) {
        console.error(err);
        showStatus("ログインに失敗しました。", "error");
        setLoading(false);
      }
    });

    clearSavedBtn.addEventListener("click", () => {
      clearSavedLogin();
      passcodeEl.value = "";
      displayNameEl.value = "";
      showStatus("保存済みログイン情報を削除しました。", "ok");
    });
  </script>
</body>
</html>
